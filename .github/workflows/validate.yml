name: Validate

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile integration
        run: python -m compileall custom_components/supraconnect
